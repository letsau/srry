<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rija ❤️</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',cursive;
  color:white;
  overflow-x:hidden;

  background: linear-gradient(270deg,#ff4d6d,#ff1a4d,#1a001a);
  background-size:600% 600%;
  animation:bgFlow 12s ease infinite;
}

@keyframes bgFlow{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.section{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:clamp(28px,6vw,48px);
  text-shadow:0 0 20px rgba(255,120,160,0.8);
}

p{
  font-size:clamp(14px,3.5vw,18px);
  max-width:90%;
  line-height:1.8;
  color:#ffe6ec;
}

img{
  width:min(320px,85vw);
  height:min(320px,85vw);
  object-fit:cover;
  border-radius:20px;
  margin:20px;
  box-shadow:0 0 25px rgba(255,100,150,0.7);
}

button{
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4d6d,#ff1a4d);
  color:white;
  font-size:16px;
}

</style>
</head>
<body>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<div class="section">
<h1>Rija ❤️</h1>
<p>
From the moment you came into my life, everything changed.
You became my peace, my reason, my smile.
</p>
<img src="img 2.jpg">
<button onclick="location.href='page2.html'">Start</button>
</div>

</body>
</html>
