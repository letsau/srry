<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Rija ❤️</title>
<style>
body{margin:0;overflow:hidden;font-family:'Segoe UI',cursive;text-align:center;color:white;
background:linear-gradient(270deg,#ff758c,#ff7eb3,#a18cd1);background-size:600% 600%;animation:bg 12s infinite}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.container{margin-top:80px;animation:fadeIn 2s}
@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
img{width:320px;border-radius:20px;animation:float 4s infinite;margin:20px}
@keyframes float{50%{transform:translateY(-20px)}}
button{padding:12px 30px;border-radius:30px;border:none;background:rgba(255,255,255,0.2);color:white}
</style>
</head>
<body>

<audio autoplay loop><source src="music.mp3"></audio>

<div class="container">
<h1>Rija ❤️</h1>
<p>
From the moment you came into my life, everything changed. 
You brought a kind of warmth I didn’t even know I was missing.

This… this is for you.
</p>
<img src="img 2.jpg">
<br>
<button onclick="go('page2.html')">Start</button>
</div>

<script>
function go(p){document.body.style.opacity=0;setTimeout(()=>{window.location=p},500)}
</script>

</body>
</html>
