<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Just This...</title>

<style>
body{
  margin:0;
  overflow:hidden;
  text-align:center;
  font-family:'Segoe UI', cursive;
  color:white;

  background: linear-gradient(270deg,#ff9aa2,#ff758c,#ff7eb3);
  background-size:400% 400%;
  animation:bg 12s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* center content */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;
}

/* main message */
h1{
  font-size:36px;
  text-shadow:0 0 20px rgba(255,255,255,1);
  opacity:0;
  animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

/* hidden final message */
.final{
  margin-top:20px;
  font-size:20px;
  max-width:600px;
  opacity:0;
  transition:1s;
}

/* button */
button{
  margin-top:30px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,77,109,1);
}

/* celebration particles */
.celebrate{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  pointer-events:none;
}

.confetti, .heart{
  position:absolute;
  width:10px;
  height:10px;
  animation:fall linear forwards;
}

.confetti{
  background:white;
}

.heart{
  font-size:20px;
  background:none;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

/* glow burst */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:1;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>
<div class="celebrate" id="celebrate"></div>

<div class="container">

<h1>
Stay… and let me love you the way I should have.<br>
Or go… and take the best part of me with you.
</h1>

<div class="final" id="finalMsg">
I’ll still be here… choosing you. Always.
</div>

<button onclick="celebrate()">One Last Click ❤️</button>

</div>

<script>
function celebrate(){
  // show final message
  document.getElementById("finalMsg").style.opacity = "1";

  // flash effect
  const flash = document.getElementById("flash");
  flash.style.opacity = "0.8";
  setTimeout(()=>flash.style.opacity="0",200);

  // create confetti + hearts
  for(let i=0;i<80;i++){
    let el = document.createElement("div");

    if(Math.random() > 0.5){
      el.classList.add("confetti");
    } else {
      el.classList.add("heart");
      el.innerHTML = "❤️";
    }

    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (2 + Math.random()*3) + "s";

    document.getElementById("celebrate").appendChild(el);

    setTimeout(()=>el.remove(),5000);
  }
}
</script>

</body>
</html>
